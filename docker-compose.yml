version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8081:8080"
    environment:
      - SERVER_PORT=8080
      - PISTON_API_URL=https://emkc.org/api/v2/piston/execute
      - GEMINI_API_KEY=${GEMINI_API_KEY:-ENTER_YOUR_API_KEY_HERE}

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

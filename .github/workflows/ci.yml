# Single CI workflow for AI Code Mentor
# Repo: https://github.com/abhaychaudhary18/AI-CODE-MENTOR
#
# Remove any legacy duplicates on GitHub if they still appear under Actions:
#   ci_cd.yml, ci-cd.yml (keep only this ci.yml)
#
# Optional Actions secret: GEMINI_API_KEY (for Compose env in Docker job only)

name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build

  backend:
    name: Backend — Maven verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Compile, test, package
        run: mvn -B verify

  docker:
    name: Docker — Compose config & image build
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose config

      - name: Build images
        run: docker compose build
